<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Lupo Challenge — Live Scoring</title>
<link rel="stylesheet" href="/static/vendor/chessground/assets/chessground.base.css">
<link rel="stylesheet" href="/static/vendor/chessground/assets/chessground.brown.css">
<link rel="stylesheet" href="/static/vendor/chessground/assets/chessground.cburnett.css">
<style>
/* ---- Reset & base ---- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--bg2:#16213e;--card:#0f3460;
  --text:#e0e0e0;--text-dim:#8a8a9a;
  --green:#00c853;--red:#ff1744;--gold:#ffd600;
  --fire:#ff6d00;--blue:#448aff;
  --radius:8px;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}

/* ---- Header ---- */
.header{width:100%;max-width:720px;padding:18px 16px 0;text-align:center}
.header h1{font-size:1.3rem;font-weight:700;letter-spacing:1px}
.header h1 span{color:var(--gold)}
.header .subtitle{font-size:0.78rem;color:var(--text-dim);margin-top:2px}

/* ---- Score bar ---- */
.score-bar{
  width:100%;max-width:720px;display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;margin-top:10px;
  background:var(--bg2);border-radius:var(--radius);
}
.score-bar .label{font-size:0.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px}
.score-bar .value{font-size:1.4rem;font-weight:700}
.score-bar .value.positive{color:var(--green)}
.score-bar .value.negative{color:var(--red)}
.score-move{font-size:0.85rem;color:var(--text-dim)}
.score-move strong{color:var(--text);font-size:1.1rem}

/* ---- Info banner (best-move count reveal) ---- */
.info-banner{
  width:100%;max-width:720px;margin-top:10px;padding:10px 16px;
  border-radius:var(--radius);text-align:center;font-weight:600;font-size:0.95rem;
  transition:all 0.3s ease;
}
.info-banner.hard{background:rgba(255,109,0,0.15);color:var(--fire);border:1px solid rgba(255,109,0,0.3)}
.info-banner.easy{background:rgba(0,200,83,0.15);color:var(--green);border:1px solid rgba(0,200,83,0.3)}
.info-banner.bonus{background:rgba(255,214,0,0.15);color:var(--gold);border:1px solid rgba(255,214,0,0.3)}
.info-banner.result-good{background:rgba(0,200,83,0.2);color:var(--green);border:1px solid rgba(0,200,83,0.4)}
.info-banner.result-bad{background:rgba(255,23,68,0.15);color:var(--red);border:1px solid rgba(255,23,68,0.3)}
.info-banner.idle{background:rgba(255,255,255,0.04);color:var(--text-dim);border:1px solid rgba(255,255,255,0.08)}

/* ---- Board container ---- */
.board-zone{margin-top:14px;position:relative}
.cg-wrap{width:min(88vw,420px);height:min(88vw,420px)}

/* ---- Move history strip ---- */
.history-strip{
  width:100%;max-width:720px;display:flex;flex-wrap:wrap;gap:4px;
  padding:12px 16px;margin-top:12px;justify-content:center;
}
.history-slot{
  width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:0.55rem;font-weight:700;
  background:rgba(255,255,255,0.06);color:var(--text-dim);
  transition:all 0.3s ease;
}
.history-slot.best{background:var(--green);color:#000}
.history-slot.miss{background:var(--red);color:#fff}
.history-slot.current{border:2px solid var(--gold);background:rgba(255,214,0,0.15)}
.history-slot.bonus-slot{background:var(--gold);color:#000}

/* ---- End screen ---- */
.end-screen{
  width:100%;max-width:720px;padding:24px 16px;text-align:center;display:none;
}
.end-screen.visible{display:block}
.end-title{font-size:1.6rem;font-weight:800;margin-bottom:6px}
.end-score{font-size:2.4rem;font-weight:800;color:var(--gold);margin:8px 0}
.end-max{font-size:0.85rem;color:var(--text-dim);margin-bottom:16px}
.end-grid{
  display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin:16px 0;
}
.end-grid .eslot{
  width:22px;height:22px;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.5rem;font-weight:700;
}
.end-grid .eslot.best{background:var(--green);color:#000}
.end-grid .eslot.miss{background:var(--red);color:#fff}
.end-grid .eslot.bonus-slot{background:var(--gold);color:#000}

.share-block{
  background:var(--bg2);border-radius:var(--radius);padding:14px;
  margin:16px auto;max-width:400px;text-align:left;
  font-family:'Courier New',monospace;font-size:0.78rem;
  white-space:pre-wrap;word-break:break-word;color:var(--text);
  line-height:1.5;
}
.btn{
  padding:10px 20px;border:none;border-radius:var(--radius);
  font-weight:600;font-size:0.85rem;cursor:pointer;transition:all 0.15s;
  margin:4px;
}
.btn-primary{background:var(--gold);color:#000}
.btn-primary:hover{opacity:0.85}
.btn-secondary{background:rgba(255,255,255,0.1);color:var(--text)}
.btn-secondary:hover{background:rgba(255,255,255,0.18)}
.btn-copy.copied{background:var(--green);color:#000}

/* ---- Loading screen ---- */
.loading-screen{text-align:center;padding:60px 16px}
.loading-screen h2{font-size:1.2rem;margin-bottom:8px}
.loading-screen p{color:var(--text-dim);font-size:0.85rem}

/* ---- Sound indicator ---- */
.sound-badge{display:inline-block;margin-left:6px;font-size:1.1em;vertical-align:middle}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen" class="loading-screen">
  <h2>Loading challenge...</h2>
  <p id="loading-info"></p>
</div>

<!-- Game UI (hidden until loaded) -->
<div id="game-ui" style="display:none">
  <div class="header">
    <h1>Dr Lupo <span>Challenge</span></h1>
    <div class="subtitle" id="game-subtitle"></div>
  </div>

  <div class="score-bar">
    <div>
      <div class="label">Score</div>
      <div class="value positive" id="score-display">0</div>
    </div>
    <div class="score-move">
      Move <strong id="move-display">1</strong> / <span id="total-display">26</span>
    </div>
    <div style="text-align:right">
      <div class="label">Max possible</div>
      <div class="value" id="max-display" style="font-size:1rem;color:var(--text-dim)">0</div>
    </div>
  </div>

  <div class="info-banner idle" id="info-banner">Get ready...</div>

  <div class="board-zone">
    <div id="board" class="cg-wrap"></div>
  </div>

  <div class="history-strip" id="history-strip"></div>
</div>

<!-- End screen -->
<div id="end-screen" class="end-screen">
  <div class="end-title">Challenge Complete!</div>
  <div class="end-score" id="end-score">0</div>
  <div class="end-max" id="end-max">out of 0 possible</div>
  <div class="end-grid" id="end-grid"></div>
  <div class="share-block" id="share-block"></div>
  <button class="btn btn-primary btn-copy" id="btn-copy" onclick="copyShare()">📋 Copy to clipboard</button>
  <a id="btn-lichess" class="btn btn-secondary" target="_blank" rel="noopener">♟ View on Lichess</a>
</div>

<script type="module">
import { Chessground } from '/static/vendor/chessground/chessground.min.js';

// ---- Globals ----
let challengeData = null;
let cg = null;          // chessground instance
let posIdx = 0;         // current position index (0-based)
let score = 0;
let maxPossible = 0;
let moveHistory = [];   // [{points, isBest}]
let inBonusRound = false;
let bonusFoundCount = 0;
let foundBestUCIs = new Set(); // best moves already found in current bonus round

// ---- Chess.js-lite: minimal move legality via FEN + chessground ----
// We rely on pre-computed all_moves from the JSON. Build a map uci->data for fast lookup.
let currentAllMoves = {};
let currentBestMoves = {};

// ---- Audio ----
function beep(freq, dur, vol = 0.15) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; gain.gain.value = vol;
    osc.start(); osc.stop(ctx.currentTime + dur / 1000);
  } catch {}
}
const sfx = {
  move:  () => beep(440, 60, 0.08),
  best:  () => beep(880, 120, 0.12),
  bonus: () => { beep(660, 80, 0.1); setTimeout(() => beep(880, 80, 0.1), 100); setTimeout(() => beep(1100, 150, 0.12), 200); },
  error: () => beep(220, 200, 0.12),
  star:  () => { beep(880, 80, 0.1); setTimeout(() => beep(1320, 200, 0.15), 120); },
};

// ---- Load challenge ----
async function loadChallenge() {
  const path = window.location.pathname; // e.g. /play/mfJW36UO_ply14
  const id = path.split('/play/')[1];
  if (!id) { document.getElementById('loading-info').textContent = 'No challenge ID in URL'; return; }

  try {
    const resp = await fetch(`/api/challenge/${id}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    challengeData = await resp.json();
  } catch (e) {
    document.getElementById('loading-info').textContent = `Failed to load: ${e.message}`;
    return;
  }

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('game-ui').style.display = '';
  document.getElementById('game-subtitle').textContent =
    `${challengeData.white} vs ${challengeData.black} — playing as ${challengeData.player_color}`;
  document.getElementById('total-display').textContent = challengeData.num_moves;

  // Build history strip
  const strip = document.getElementById('history-strip');
  strip.innerHTML = '';
  for (let i = 0; i < challengeData.num_moves; i++) {
    const slot = document.createElement('div');
    slot.className = 'history-slot' + (i === 0 ? ' current' : '');
    slot.id = `slot-${i}`;
    slot.textContent = i + 1;
    strip.appendChild(slot);
  }

  initBoard();
  startPosition();
}

// ---- Board ----
function initBoard() {
  const orientation = challengeData.player_color;
  cg = Chessground(document.getElementById('board'), {
    orientation: orientation,
    movable: { free: false, color: orientation, events: { after: onPlayerMove } },
    draggable: { showGhost: true },
    animation: { enabled: true, duration: 200 },
    premovable: { enabled: false },
  });
}

function setPosition(fen, interactive = true) {
  const parts = fen.split(' ');
  const turnColor = parts[1] === 'w' ? 'white' : 'black';
  const isPlayerTurn = turnColor === challengeData.player_color;

  // Build dests map from all_moves
  const dests = new Map();
  if (interactive && isPlayerTurn) {
    const pos = challengeData.positions[posIdx];
    for (const m of pos.all_moves) {
      const from = m.uci.substring(0, 2);
      const to = m.uci.substring(2, 4);
      if (!dests.has(from)) dests.set(from, []);
      dests.get(from).push(to);
    }
  }

  cg.set({
    fen: fen,
    turnColor: turnColor,
    movable: {
      free: false,
      color: interactive && isPlayerTurn ? challengeData.player_color : undefined,
      dests: interactive && isPlayerTurn ? dests : new Map(),
    },
    lastMove: undefined,
  });
}

// ---- Game flow ----
function startPosition() {
  if (posIdx >= challengeData.num_moves) { endGame(); return; }

  const pos = challengeData.positions[posIdx];
  inBonusRound = false;
  bonusFoundCount = 0;
  foundBestUCIs.clear();

  // Index moves
  currentAllMoves = {};
  for (const m of pos.all_moves) currentAllMoves[m.uci] = m;
  currentBestMoves = {};
  for (const m of pos.best_moves) currentBestMoves[m.uci] = m;

  setPosition(pos.fen, true);
  updateScoreDisplay();
  document.getElementById('move-display').textContent = posIdx + 1;

  // Highlight current slot
  document.querySelectorAll('.history-slot').forEach(s => s.classList.remove('current'));
  const slot = document.getElementById(`slot-${posIdx}`);
  if (slot) slot.classList.add('current');

  // Reveal best-move count
  const count = pos.best_move_count;
  const banner = document.getElementById('info-banner');
  if (count === 1) {
    banner.className = 'info-banner hard';
    banner.innerHTML = '🔥 <strong>1</strong> best move — find it!';
  } else if (count === 2) {
    banner.className = 'info-banner easy';
    banner.innerHTML = `✅ <strong>${count}</strong> best moves`;
  } else {
    banner.className = 'info-banner easy';
    banner.innerHTML = `⭐ <strong>3 or more</strong> best moves`;
    sfx.star();
  }
}

function onPlayerMove(from, to) {
  const uci = from + to;
  // Check for promotion (always queen for simplicity)
  const promoUci = uci + 'q';
  const moveData = currentAllMoves[uci] || currentAllMoves[promoUci];
  const actualUci = currentAllMoves[uci] ? uci : promoUci;

  if (!moveData) return; // shouldn't happen with dests

  const pos = challengeData.positions[posIdx];
  const bestEval = pos.best_moves[0].eval_cp;
  const isBest = actualUci in currentBestMoves && !foundBestUCIs.has(actualUci);

  if (inBonusRound) {
    handleBonusMove(actualUci, moveData, isBest, pos);
  } else {
    handleMainMove(actualUci, moveData, isBest, pos, bestEval);
  }
}

function handleMainMove(uci, moveData, isBest, pos, bestEval) {
  const banner = document.getElementById('info-banner');

  if (isBest) {
    // +3 points
    score += 3;
    sfx.best();
    banner.className = 'info-banner result-good';
    banner.innerHTML = `✅ Best move! <strong>+3</strong>`;

    foundBestUCIs.add(uci);

    // Record the +3 immediately
    recordMove(3, true);

    // Check if there are more best moves to find (bonus round)
    const remainingBest = pos.best_moves.filter(m => !foundBestUCIs.has(m.uci));
    if (remainingBest.length > 0 && foundBestUCIs.size < 3) {
      // Enter bonus round
      inBonusRound = true;
      bonusFoundCount = 0;
      setTimeout(() => {
        banner.className = 'info-banner bonus';
        banner.innerHTML = `🎯 Find another best move for <strong>+1 bonus</strong> point!`;
        // Reset board to same position for another attempt
        setPosition(pos.fen, true);
      }, 800);
      updateScoreDisplay();
      return;
    }

    // Advance
    setTimeout(() => advanceToNext(pos), 900);
  } else {
    // Penalty
    const cpDiff = bestEval - moveData.eval_cp;
    const penalty = Math.max(0, cpDiff) / 100;
    score -= penalty;
    sfx.error();
    banner.className = 'info-banner result-bad';
    banner.innerHTML = `❌ Not a best move — <strong>−${penalty.toFixed(2)}</strong> pts`;

    recordMove(-penalty, false);
    setTimeout(() => advanceToNext(pos), 1200);
  }
  updateScoreDisplay();
}

function handleBonusMove(uci, moveData, isBest, pos) {
  const banner = document.getElementById('info-banner');

  if (isBest) {
    bonusFoundCount++;
    score += 1;
    foundBestUCIs.add(uci);
    sfx.bonus();
    banner.className = 'info-banner result-good';
    banner.innerHTML = `🎯 Bonus! <strong>+1</strong>`;

    // Check if more bonus attempts available (max 2 bonus = 3 total found)
    const remainingBest = pos.best_moves.filter(m => !foundBestUCIs.has(m.uci));
    if (remainingBest.length > 0 && foundBestUCIs.size < 3) {
      setTimeout(() => {
        banner.className = 'info-banner bonus';
        banner.innerHTML = `🎯 Find another best move for <strong>+1 bonus</strong> point!`;
        setPosition(pos.fen, true);
      }, 800);
      updateScoreDisplay();
      return;
    }

    // All found or max reached
    const totalPts = 3 + bonusFoundCount;
    // Update the recorded move points and slot DOM
    moveHistory[moveHistory.length - 1] = { points: totalPts, isBest: true, bonusCount: bonusFoundCount };
    const slot = document.getElementById(`slot-${posIdx}`);
    if (slot) {
      slot.className = 'history-slot bonus-slot';
      slot.textContent = `+${totalPts}`;
    }
    setTimeout(() => advanceToNext(pos), 900);
  } else {
    // Bonus miss — no extra penalty, just stop bonus round
    // The +3 was already earned, keep it
    banner.className = 'info-banner result-bad';
    banner.innerHTML = `❌ Not a best move — bonus round over`;
    sfx.error();
    setTimeout(() => advanceToNext(pos), 1000);
  }
  updateScoreDisplay();
}

function recordMove(points, isBest) {
  moveHistory.push({ points, isBest, bonusCount: 0 });
  const slot = document.getElementById(`slot-${posIdx}`);
  if (slot) {
    slot.className = 'history-slot ' + (isBest ? 'best' : 'miss');
    if (isBest) {
      slot.textContent = `+${Math.round(points)}`;
    } else {
      slot.textContent = points.toFixed(1);
    }
  }
}

function advanceToNext(pos) {
  // Animate opponent reply
  if (pos.opponent_reply_uci && pos.fen_after_opponent) {
    const from = pos.opponent_reply_uci.substring(0, 2);
    const to = pos.opponent_reply_uci.substring(2, 4);
    
    // Show the position after player's actual game move, then opponent replies
    // We need the FEN after the game move but before opponent reply
    // Use fen_after_opponent and show the opponent move animation
    cg.set({
      fen: pos.fen_after_opponent,
      lastMove: [from, to],
      movable: { free: false, color: undefined, dests: new Map() },
    });
    sfx.move();
  }

  // Calculate max possible so far
  maxPossible = 0;
  for (let i = 0; i <= posIdx; i++) {
    const p = challengeData.positions[i];
    maxPossible += Math.min(3, p.best_move_count) >= 3 ? 5 : (p.best_move_count >= 2 ? 3 + Math.min(2, p.best_move_count - 1) : 3);
  }

  posIdx++;
  setTimeout(() => startPosition(), 600);
}

function updateScoreDisplay() {
  const el = document.getElementById('score-display');
  el.textContent = score >= 0 ? score.toFixed(1) : score.toFixed(1);
  el.className = 'value ' + (score >= 0 ? 'positive' : 'negative');

  // Update max possible
  let mp = 0;
  for (let i = 0; i < challengeData.num_moves; i++) {
    const p = challengeData.positions[i];
    const bc = Math.min(3, p.best_move_count);
    mp += bc >= 3 ? 5 : (bc >= 2 ? 3 + (bc - 1) : 3);
  }
  document.getElementById('max-display').textContent = mp;
}

// ---- End game ----
function endGame() {
  document.getElementById('game-ui').style.display = 'none';
  const endScreen = document.getElementById('end-screen');
  endScreen.classList.add('visible');

  // Calculate totals
  let mp = 0;
  for (const p of challengeData.positions) {
    const bc = Math.min(3, p.best_move_count);
    mp += bc >= 3 ? 5 : (bc >= 2 ? 3 + (bc - 1) : 3);
  }

  document.getElementById('end-score').textContent = score.toFixed(1);
  document.getElementById('end-max').textContent = `out of ${mp} possible`;

  // Build grid
  const gridEl = document.getElementById('end-grid');
  gridEl.innerHTML = '';
  for (let i = 0; i < moveHistory.length; i++) {
    const h = moveHistory[i];
    const slot = document.createElement('div');
    if (h.isBest && h.bonusCount > 0) {
      slot.className = 'eslot bonus-slot';
      slot.textContent = `+${(3 + h.bonusCount)}`;
    } else if (h.isBest) {
      slot.className = 'eslot best';
      slot.textContent = '+3';
    } else {
      slot.className = 'eslot miss';
      slot.textContent = h.points.toFixed(1);
    }
    gridEl.appendChild(slot);
  }

  // Build share text
  const emojis = moveHistory.map(h => {
    if (h.isBest && h.bonusCount > 0) return '🌟';
    if (h.isBest) return '🟩';
    return '🟥';
  });
  const lines = [];
  for (let i = 0; i < emojis.length; i += 13) {
    lines.push(emojis.slice(i, i + 13).join(''));
  }

  const shareText =
    `Dr Lupo Challenge 🏆\n` +
    `${challengeData.white} vs ${challengeData.black}\n` +
    `Score: ${score.toFixed(1)} / ${mp}\n` +
    lines.join('\n') + '\n' +
    challengeData.game_url;

  document.getElementById('share-block').textContent = shareText;
  window._shareText = shareText;

  // Lichess link
  const lichessBtn = document.getElementById('btn-lichess');
  lichessBtn.href = `${challengeData.game_url}#${challengeData.start_ply}`;
}

// ---- Copy ----
window.copyShare = function() {
  navigator.clipboard.writeText(window._shareText).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy to clipboard'; btn.classList.remove('copied'); }, 2000);
  });
};

// ---- Init ----
loadChallenge();
</script>
</body>
</html>
